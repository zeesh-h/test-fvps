name: Secure-Ubuntu-SSH

on:
  workflow_dispatch:

jobs:
  secure-ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Setup User and SSH Public Key
        run: |
          sudo useradd -m -s /bin/bash -G sudo test
          sudo mkdir -p /home/test/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" | sudo tee /home/test/.ssh/authorized_keys > /dev/null
          sudo chmod 700 /home/test/.ssh
          sudo chmod 600 /home/test/.ssh/authorized_keys
          sudo chown -R test:test /home/test/.ssh

      - name: Install Tailscale on Host
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Configure Secure SSH Daemon
        run: |
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
          sudo sed -i 's/#PubkeyAuthentication yes/PubkeyAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh restart
          sleep 5
          
      - name: Establish Tailscale Connection
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${{ github.run_id }} --accept-routes
          
          TAILSCALE_IP=""
          retries=0
          while [ -z "$TAILSCALE_IP" ] && [ $retries -lt 10 ]; do
            TAILSCALE_IP=$(tailscale ip -4)
            sleep 5
            retries=$((retries + 1))
          done
          
          if [ -z "$TAILSCALE_IP" ]; then
            echo "Tailscale IP not assigned. Exiting."
            exit 1
          fi
          
          echo "TAILSCALE_IP=$TAILSCALE_IP" >> $GITHUB_ENV

      - name: Verify SSH Accessibility
        run: |
          echo "Testing SSH connectivity..."
          sudo service ssh status
          timeout 10 bash -c "cat < /dev/null > /dev/tcp/localhost/22" && echo "SSH port accessible" || echo "SSH port test failed"

      - name: Maintain Connection
        run: |
          echo ""
          echo "=== SECURE UBUNTU SSH ACCESS ==="
          echo "Tailscale IP: ${{ env.TAILSCALE_IP }}"
          echo "SSH Command: ssh test@${{ env.TAILSCALE_IP }}"
          echo "Authentication: Public Key Only (No passwords)"
          echo "================================="
          echo ""
          
          # Keep runner active
          while true; do
            echo "[$(date)] Ubuntu SSH Active - Use Actions UI to cancel workflow early"
            sleep 300
          done
